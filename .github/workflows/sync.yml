name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "psiak@example.com"
          git config --global user.name "psiak"
          git remote add hf https://psiak:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/psiak/moj-grajek
          git push --force hf main
